#
# YOLO57: Combo E = yolo39 + head P5 depth bump (2 -> 4).
# yolo39 head is [4,4,4,2] — asymmetric tail. This variant finishes the head
# with n=4 on P5 output for full [4,4,4,4] symmetry, testing whether the last
# head block was the only remaining under-provisioned point.
#
# Delta vs yolo39:
#   - head #22 P5: n=2 -> n=4
# All other args unchanged from yolo39.
#
# C2fStar args: [c2, e, attn, shortcut, uib_e, dw_k]

nc: 80
end2end: False
reg_max: 1
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

backbone:
  - [-1, 1, Conv, [64, 3, 2]] # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]] # 1-P2/4
  - [-1, 2, C2fStar, [256, 0.25, False, True, 6.0, 5]] # 2
  - [-1, 1, Conv, [256, 3, 2]] # 3-P3/8
  - [-1, 2, C2fStar, [512, 0.25, False, True, 4.0, 5]] # 4
  - [-1, 1, Conv, [512, 3, 2]] # 5-P4/16
  - [-1, 4, C2fStar, [512, 0.5, False, True, 2.5, 5]] # 6
  - [-1, 1, Conv, [1024, 3, 2]] # 7-P5/32
  - [-1, 4, C2fStar, [1024, 0.5, False, True, 2.5, 7]] # 8
  - [-1, 1, SPPF, [1024, 5, 3, True]] # 9
  - [-1, 2, C2PSA, [1024]] # 10

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 6], 1, Concat, [1]]
  - [-1, 4, C2fStar, [512, 0.5, False, True, 2.0, 5]] # 13

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 4], 1, Concat, [1]]
  - [-1, 4, C2fStar, [256, 0.5, False, True, 2.0, 7]] # 16

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 13], 1, Concat, [1]]
  - [-1, 4, C2fStar, [512, 0.5, False, True, 2.0, 5]] # 19

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 10], 1, Concat, [1]]
  - [-1, 4, C2fStar, [1024, 0.5, True, True, 2.0, 7]] # 22 ← n=2 -> n=4

  - [[16, 19, 22], 1, Detect, [nc]]
